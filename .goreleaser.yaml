version: 2
project_name: vocabgen
before:
  hooks:
    - cp CHANGELOG.md docs/changelog.md
builds:
  - main: ./cmd/vocabgen
    binary: vocabgen
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildDate={{.Date}}
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
changelog:
  disable: true

dockers_v2:
  - images:
      - "ghcr.io/npozs77/vocabgen"
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.title": "VocabGen"
      "org.opencontainers.image.description": "Vocabulary web app and flashcard tool for language learners"
      "org.opencontainers.image.source": "https://github.com/npozs77/VocabGen"
      "org.opencontainers.image.url": "https://npozs77.github.io/VocabGen/"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.licenses": "MIT"

release:
  header: "{{ .TagBody }}"
