{{define "title"}}Documentation{{end}}
{{define "content"}}
<style>
  .doc-index h1 { font-size: 1.5rem; font-weight: 700; margin-top: 0; margin-bottom: 0.75rem; color: #1f2937; }
  .doc-index h2 { font-size: 1.2rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.25rem; color: #1f2937; }
  .doc-index h2 a { color: #2563eb; text-decoration: none; }
  .doc-index h2 a:hover { text-decoration: underline; }
  .doc-index p { margin-bottom: 0.5rem; line-height: 1.6; color: #4b5563; font-size: 0.875rem; }
  .doc-index ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .doc-index li { margin-bottom: 0.15rem; line-height: 1.5; color: #6b7280; font-size: 0.8125rem; }
  .doc-index hr { border: none; border-top: 1px solid #e5e7eb; margin: 1rem 0; }
</style>
<div class="max-w-2xl">
  <div class="bg-white rounded-lg shadow p-6 doc-index">
    {{.Content}}
  </div>
</div>
{{end}}
