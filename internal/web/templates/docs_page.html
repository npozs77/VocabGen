{{define "title"}}{{.Title}}{{end}}
{{define "content"}}
<style>
  .doc-content h1 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #1f2937; }
  .doc-content h2 { font-size: 1.25rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.5rem; color: #1f2937; }
  .doc-content h3 { font-size: 1.1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; color: #374151; }
  .doc-content h4 { font-size: 1rem; font-weight: 600; margin-top: 0.75rem; margin-bottom: 0.5rem; color: #374151; }
  .doc-content p { margin-bottom: 0.75rem; line-height: 1.7; }
  .doc-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .doc-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .doc-content li { margin-bottom: 0.25rem; line-height: 1.6; }
  .doc-content code { background-color: #f3f4f6; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; }
  .doc-content pre { background-color: #1f2937; color: #e5e7eb; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
  .doc-content pre code { background-color: transparent; padding: 0; color: inherit; }
  .doc-content table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
  .doc-content th { background-color: #f9fafb; padding: 0.5rem 0.75rem; text-align: left; font-weight: 600; border-bottom: 2px solid #e5e7eb; }
  .doc-content td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #e5e7eb; }
  .doc-content blockquote { border-left: 4px solid #d1d5db; padding-left: 1rem; margin-bottom: 0.75rem; color: #6b7280; font-style: italic; }
</style>
<div class="max-w-3xl">
  <a href="/docs" class="text-blue-600 hover:underline text-sm mb-4 inline-block">← Back to Documentation</a>

  <h1 class="text-2xl font-semibold text-gray-800 mb-6">{{.Title}}</h1>

  <div class="bg-white rounded-lg shadow p-6 doc-content text-sm text-gray-700">
    {{.Content}}
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('pre > code.language-mermaid').forEach(function(codeEl) {
      var pre = codeEl.parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = codeEl.textContent;
      pre.parentElement.replaceChild(div, pre);
    });
    mermaid.initialize({ startOnLoad: true, theme: 'default' });
    mermaid.run();
  });
</script>
{{end}}
