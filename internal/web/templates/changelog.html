{{define "title"}}Changelog{{end}}
{{define "content"}}
<style>
  .doc-content h1 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #1f2937; }
  .doc-content h2 { font-size: 1.25rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.5rem; color: #1f2937; }
  .doc-content h3 { font-size: 1.1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; color: #374151; }
  .doc-content p { margin-bottom: 0.75rem; line-height: 1.7; }
  .doc-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .doc-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .doc-content li { margin-bottom: 0.25rem; line-height: 1.6; }
  .doc-content code { background-color: #f3f4f6; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; }
  .doc-content pre { background-color: #1f2937; color: #e5e7eb; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
  .doc-content pre code { background-color: transparent; padding: 0; color: inherit; }
</style>
<div class="max-w-3xl">
  <h1 class="text-2xl font-semibold text-gray-800 mb-6">Changelog</h1>

  <div class="bg-white rounded-lg shadow p-6 doc-content text-sm text-gray-700">
    {{.Content}}
  </div>
</div>
{{end}}
